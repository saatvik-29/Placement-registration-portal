{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <h3 class="mb-4 text-primary fw-bold"><i class="fas fa-plus-circle me-2"></i>Create New Placement Drive
                </h3>

                <form method="POST" action="{{ url_for('company.create_drive') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Job Title</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="job_title"
                            required placeholder="Software Engineer">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Job Description</label>
                        <textarea class="form-control bg-light border-0 shadow-none p-3" name="job_description" rows="4"
                            required placeholder="Detailed description of the role and responsibilities..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Eligibility Criteria</label>
                        <textarea class="form-control bg-light border-0 shadow-none p-3" name="eligibility" rows="3"
                            required placeholder="Minimum CGPA, B.Tech CSE/IT only, etc..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold">Application Deadline</label>
                        <input type="date" class="form-control bg-light border-0 shadow-none p-3" name="deadline"
                            required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-5">
                        <a href="{{ url_for('company.dashboard') }}"
                            class="btn btn-light rounded-pill px-4 shadow-sm text-muted">Cancel</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm fw-bold">Submit for
                            Approval</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="mt-4 text-center text-muted small">
            <p><i class="fas fa-info-circle me-1"></i>New assignment drives will be reviewed by administrators before
                being visible to students.</p>
        </div>
    </div>
</div>
{% endblock %}
