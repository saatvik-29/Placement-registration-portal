{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-block p-3 mb-3">
                        <i class="fas fa-user-graduate text-primary fa-2x"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Student Registration</h3>
                    <p class="text-muted small">Create your account to browse and apply for jobs.</p>
                </div>

                <form method="POST" action="{{ url_for('auth.register_student') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Full Name</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="name" required
                            placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Contact Info</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="contact"
                            required placeholder="Email or Phone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Username</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="username"
                            required placeholder="Choose a username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold">Password</label>
                        <input type="password" class="form-control bg-light border-0 shadow-none p-3" name="password"
                            required placeholder="Create a password">
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Register as
                            Student</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('auth.login') }}"
                            class="text-primary fw-bold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
