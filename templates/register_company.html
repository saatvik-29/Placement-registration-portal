{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-secondary bg-opacity-10 rounded-circle d-inline-block p-3 mb-3">
                        <i class="fas fa-building text-secondary fa-2x"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Company Registration</h3>
                    <p class="text-muted small">Partner with us to find the best talent.</p>
                </div>

                <form method="POST" action="{{ url_for('auth.register_company') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Company Name</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="company_name"
                            required placeholder="Tech Innovators Inc.">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">HR Contact (Email/Phone)</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="hr_contact"
                            required placeholder="hr@techinnovators.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Company Website</label>
                        <input type="url" class="form-control bg-light border-0 shadow-none p-3" name="website"
                            placeholder="https://techinnovators.com">
                    </div>
                    <hr class="text-muted my-4">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Account Username</label>
                        <input type="text" class="form-control bg-light border-0 shadow-none p-3" name="username"
                            required placeholder="corporate_admin">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold">Account Password</label>
                        <input type="password" class="form-control bg-light border-0 shadow-none p-3" name="password"
                            required placeholder="Create a strong password">
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-secondary btn-lg rounded-pill shadow-sm">Register
                            Company</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Already registered? <a href="{{ url_for('auth.login') }}"
                            class="text-secondary fw-bold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
